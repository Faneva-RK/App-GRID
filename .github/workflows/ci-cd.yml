name: CI-CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: projet-faneva
  GCP_REGION: europe-west1
  AR_REPOSITORY: collab-tasks
  GKE_CLUSTER: cluster-faneva
  GKE_ZONE: europe-west1-b

jobs:
  ci-auth-service:
    name: CI auth-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/auth-service/package.json

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: node --check src/index.js && node --check src/controllers/auth.controller.js && node --check src/routes/auth.routes.js

  ci-task-service:
    name: CI task-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/task-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/task-service/package.json

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: node --check src/index.js && node --check src/controllers/project.controller.js && node --check src/controllers/task.controller.js

  ci-frontend:
    name: CI frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  deploy-gke:
    name: Build, push, deploy
    needs:
      - ci-auth-service
      - ci-task-service
      - ci-frontend
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Install GKE auth plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet
          gke-gcloud-auth-plugin --version

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet

      - name: Build auth-service image
        run: docker build -t "$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPOSITORY/auth-service:$IMAGE_TAG" ./services/auth-service

      - name: Build task-service image
        run: docker build -t "$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPOSITORY/task-service:$IMAGE_TAG" ./services/task-service

      - name: Build frontend image
        run: docker build -t "$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPOSITORY/frontend:$IMAGE_TAG" ./services/frontend

      - name: Push auth-service image
        run: docker push "$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPOSITORY/auth-service:$IMAGE_TAG"

      - name: Push task-service image
        run: docker push "$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPOSITORY/task-service:$IMAGE_TAG"

      - name: Push frontend image
        run: docker push "$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPOSITORY/frontend:$IMAGE_TAG"

      - name: Get GKE credentials
        run: gcloud container clusters get-credentials "$GKE_CLUSTER" --zone "$GKE_ZONE"

      - name: Deploy namespace and backend
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/mongodb/secret.yaml
          kubectl apply -f k8s/mongodb/service.yaml
          kubectl delete statefulset mongodb -n collab-tasks --ignore-not-found --cascade=orphan
          kubectl apply -f k8s/mongodb/statefulset.yaml
          kubectl apply -f k8s/auth-service/service.yaml
          kubectl apply -f k8s/auth-service/deployment.yaml
          kubectl apply -f k8s/task-service/service.yaml
          kubectl apply -f k8s/task-service/deployment.yaml
          kubectl apply -f k8s/task-service/hpa.yaml
          kubectl apply -f k8s/frontend/service.yaml
          kubectl apply -f k8s/frontend/deployment.yaml
          kubectl apply -f k8s/ingress/ingress.yaml
          kubectl set image deployment/auth-service auth-service="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPOSITORY/auth-service:$IMAGE_TAG" -n collab-tasks
          kubectl set image deployment/task-service task-service="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPOSITORY/task-service:$IMAGE_TAG" -n collab-tasks
          kubectl set image deployment/frontend frontend="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$AR_REPOSITORY/frontend:$IMAGE_TAG" -n collab-tasks
          kubectl rollout status deployment/auth-service -n collab-tasks
          kubectl rollout status deployment/task-service -n collab-tasks
          kubectl rollout status deployment/frontend -n collab-tasks
