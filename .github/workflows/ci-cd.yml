name: CI-CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ci-auth-service:
    name: CI auth-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/auth-service/package.json

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: node --check src/index.js && node --check src/controllers/auth.controller.js && node --check src/routes/auth.routes.js

  ci-task-service:
    name: CI task-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/task-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/task-service/package.json

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: node --check src/index.js && node --check src/controllers/project.controller.js && node --check src/controllers/task.controller.js

  ci-frontend:
    name: CI frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  deploy-local-vm:
    name: Deploy to local VM
    needs:
      - ci-auth-service
      - ci-task-service
      - ci-frontend
    if: github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker Compose
        run: docker compose version

      - name: Build and deploy stack
        run: docker compose up -d --build --remove-orphans
